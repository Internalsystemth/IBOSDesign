<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>[COMPANY_NAME] — Staff</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f2f2f7; --surface: #ffffff;
      --text: #000000; --text-muted: #8e8e93; --border: #c6c6c8;
      --blue: #007aff; --red: #ff3b30; --green: #34c759; --orange: #ff9500;
      --brand: #1a1f2e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Plus Jakarta Sans", sans-serif; background: var(--bg); color: var(--text); padding-bottom: 90px; }
    
    .ios-nav { background: var(--surface); display: flex; justify-content: space-between; align-items: center; height: 50px; padding: 0 16px; position: sticky; top: 0; z-index: 100; border-bottom: 0.5px solid var(--border); }
    .nav-left, .nav-right { display: flex; align-items: center; gap: 12px; flex: 1; }
    .nav-right { justify-content: flex-end; }
    .nav-title { font-weight: 600; font-size: 17px; text-align: center; flex: 2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; flex-direction: column; line-height: 1.2; }
    .nav-tag { font-size: 10px; color: var(--text-muted); font-weight: 500; }
    .nav-btn { background: none; border: none; font-size: 15px; font-weight: 500; cursor: pointer; color: var(--blue); }
    .nav-btn.text-red { color: var(--red); }
    
    .content { max-width: 600px; margin: 0 auto; padding-top: 16px; }
    
    .ios-segment-group { display: flex; background: #e3e3e8; border-radius: 8px; padding: 2px; margin: 0 16px 16px; }
    .ios-segment { flex: 1; text-align: center; padding: 6px 0; font-size: 13px; font-weight: 500; border-radius: 6px; cursor: pointer; color: #000; }
    .ios-segment.active { background: #fff; box-shadow: 0 3px 8px rgba(0,0,0,0.12), 0 3px 1px rgba(0,0,0,0.04); font-weight: 600; }
    
    .ios-list-group { background: var(--surface); border-radius: 10px; margin: 0 16px 24px; overflow: hidden; }
    .ios-list-item { padding: 10px 16px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .ios-list-item:last-child { border-bottom: none; }
    
    .branch-select { width: 100%; border: none; background: transparent; font-size: 17px; outline: none; -webkit-appearance: none; padding: 4px 0; }
    
    .search-input { width: calc(100% - 32px); margin: 0 16px 12px; height: 36px; border: none; border-radius: 10px; background: #e3e3e8; padding: 0 12px; font-size: 15px; outline: none; }
    .chips { display: flex; gap: 8px; overflow-x: auto; padding: 0 16px 12px; scrollbar-width: none; }
    .chips::-webkit-scrollbar { display: none; }
    .chip { padding: 6px 14px; border-radius: 16px; background: #e5e5ea; color: var(--text); font-size: 13px; font-weight: 500; white-space: nowrap; cursor: pointer; transition: background 0.2s; }
    .chip.active { background: var(--brand); color: #fff; }
    
    .prod-img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; background: #e5e5ea; flex-shrink: 0; }
    .prod-info { flex: 1; padding: 0 12px; }
    .prod-name { font-size: 15px; font-weight: 500; color: var(--text); }
    .prod-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    
    .input-minimal { background: #e5e5ea; border: none; border-radius: 6px; padding: 6px; font-size: 16px; font-weight: 600; text-align: center; width: 50px; outline: none; }
    
    .floating-bottom { position: fixed; bottom: 0; left: 0; right: 0; padding: 16px; background: rgba(242,242,247,0.9); backdrop-filter: blur(10px); border-top: 0.5px solid var(--border); display: flex; justify-content: center; z-index: 100; }
    .btn-ios { background: var(--brand); color: #fff; border: none; border-radius: 12px; font-size: 17px; font-weight: 600; padding: 14px; width: 100%; max-width: 600px; cursor: pointer; transition: opacity 0.2s; }
    .btn-ios:active { opacity: 0.8; }
    
    .status-text { font-size: 12px; font-weight: 600; text-transform: uppercase; }
    .status-gray { color: var(--text-muted); }
    .status-blue { color: var(--blue); }
    .status-orange { color: var(--orange); }
    .status-green { color: var(--green); }
    
    /* Modals */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: flex-end; justify-content: center; z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal-sheet { background: var(--bg); width: 100%; max-width: 600px; border-radius: 12px 12px 0 0; padding: 16px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.16,1,0.3,1); max-height: 85vh; display: flex; flex-direction: column; }
    .modal-overlay.open .modal-sheet { transform: translateY(0); }
    .modal-header { text-align: center; font-weight: 600; font-size: 17px; margin-bottom: 16px; }
    .modal-scroll { overflow-y: auto; flex: 1; border-radius: 10px; overflow: hidden; margin-bottom: 16px; }
    
    .loading { padding: 32px; text-align: center; color: var(--text-muted); font-size: 15px; }
  </style>
</head>
<body>
  <nav class="ios-nav">
    <div class="nav-left">
      <button class="nav-btn" id="btnEN" onclick="setLang('en')" style="font-weight:600;">EN</button>
      <button class="nav-btn" id="btnTH" onclick="setLang('th')">TH</button>
    </div>
    <div class="nav-title">[COMPANY_NAME] <span class="nav-tag" id="nav_tag">Staff Portal</span></div>
    <div class="nav-right">
      <button class="nav-btn text-red" id="btn_logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="content">
    <div class="ios-list-group" style="margin-bottom: 16px;">
      <div class="ios-list-item" style="padding-right:8px;">
        <select id="branchSelector" class="branch-select" onchange="handleBranchChange()"><option value="" disabled selected>Select Branch...</option></select>
        <span style="color:var(--border);">›</span>
      </div>
      <div class="ios-list-item" style="padding: 0;">
        <button class="nav-btn" id="btnToggleHistory" onclick="toggleHistory()" style="width:100%; padding:12px; text-align:center;">History</button>
      </div>
    </div>

    <div id="mainArea">
      <div class="ios-segment-group">
        <div class="ios-segment active" id="tabOrder" onclick="switchTab('order')">Order</div>
        <div class="ios-segment" id="tabReceive" onclick="switchTab('receive')">Active</div>
      </div>

      <div id="viewOrder"><div class="loading">Loading menu…</div></div>
      <div id="viewReceive" style="display:none;"><div class="loading">Loading…</div></div>
    </div>
    
    <div id="viewHistory" style="display:none;">
       <div id="historyContent"><div class="loading">Loading…</div></div>
    </div>
  </div>

  <div class="floating-bottom" id="floatingReviewBtn">
    <button class="btn-ios" onclick="reviewOrder()">Review Order</button>
  </div>
  <div class="floating-bottom" id="floatingConfirmBtn" style="display:none;">
    <button class="btn-ios" style="background:var(--green);" onclick="submitReceipt()">Confirm Selected Deliveries</button>
  </div>

  <div class="modal-overlay" id="reviewModal">
    <div class="modal-sheet">
      <div class="modal-header">Review Order</div>
      <div class="ios-list-group modal-scroll" id="modalList" style="margin:0 0 16px 0;"></div>
      
      <div class="ios-list-group" style="margin:0 0 16px 0;">
        <label class="ios-list-item" style="cursor:pointer; padding: 14px 16px;">
          <span style="color:var(--red); font-weight:600;">Mark as URGENT</span>
          <input type="checkbox" id="urgentCheck" style="width:20px; height:20px; accent-color:var(--red);">
        </label>
      </div>
      
      <div style="display:flex; gap:12px;">
        <button class="btn-ios" style="background:#e5e5ea; color:var(--text);" onclick="closeModal()">Cancel</button>
        <button class="btn-ios" style="background:var(--green);" id="btnConfirm" onclick="confirmOrder()">Send</button>
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxxYwYzml0eTiKjYERhcVKmgjeqP7x3rQrgpOTewhFrtH6BGUFEUh7-Da_EX6tnzJF75Q/exec";
    const T = {
      en: { nav_tag:"Staff", logout:"Logout", view_history:"History", back_ordering:"Back", place_order:"Order", active_orders:"Active", review_order:"Review Order", go_back:"Cancel", confirm_send:"Send", sending:"Sending…", confirm_selected:"Confirm Selected Deliveries", edit:"Edit", save:"Save", saving:"Saving…", search:"Search...", no_history:"No history found.", no_active:"No active orders." },
      th: { nav_tag:"", logout:"", view_history:"", back_ordering:"", place_order:"", active_orders:"", review_order:"", go_back:"", confirm_send:"", sending:"...", confirm_selected:"", edit:"", save:"", saving:"...", search:"...", no_history:"", no_active:"" }
    };
    let currentLang=sessionStorage.getItem("lova_lang")||"en";
    const pin=sessionStorage.getItem("lova_pin")||"";
    if(!pin)window.location.href="index.html";
    let masterProducts=[],masterBranches=[],currentUser=null,selectedBranch="",pendingDeliveries=[],pendingOrderData=[],isShowingHistory=false,filterCat="ALL";
    
    function t(k){return T[currentLang][k]||T.en[k]||k;}
    function setLang(lang){
      currentLang=lang;sessionStorage.setItem("lova_lang",lang);
      document.getElementById("btnEN").style.fontWeight = lang === 'en' ? '600' : '400';
      document.getElementById("btnTH").style.fontWeight = lang === 'th' ? '600' : '400';
      document.getElementById("nav_tag").textContent=t("nav_tag");
      document.getElementById("btn_logout").textContent=t("logout");
      document.getElementById("btnToggleHistory").textContent=isShowingHistory?t("back_ordering"):t("view_history");
      document.getElementById("tabOrder").textContent=t("place_order");
      document.getElementById("tabReceive").textContent=t("active_orders");
      const btnRev = document.querySelector('#floatingReviewBtn button');
      if(btnRev) btnRev.textContent = t("review_order");
      const btnConf = document.querySelector('#floatingConfirmBtn button');
      if(btnConf) btnConf.textContent = t("confirm_selected");
    }
    
    async function callGAS(action,params={}){
      const res=await fetch(GAS_URL+"?callback=_",{method:"POST",body:JSON.stringify({action,...params}),headers:{"Content-Type":"text/plain"}});
      const data=await res.json();if(data.error)throw new Error(data.error);return data.result;
    }
    
    async function init(){
      try{
        currentUser=await callGAS("verifyStaff",{pin});
        setLang(currentLang);
        const initData=await callGAS("getStaffAppInitData");
        masterProducts=initData.products;masterBranches=initData.branches;
        const sel=document.getElementById("branchSelector");
        masterBranches.forEach(b=>sel.innerHTML+=`<option value="${b}">${b}</option>`);
        renderOrderMenu();
        if(currentUser.branch){sel.value=currentUser.branch;selectedBranch=currentUser.branch;fetchDeliveries();}
      }catch(err){alert("Session error: "+err.message);window.location.href="index.html";}
    }
    function logout(){sessionStorage.clear();window.location.href="logout.html?src=staff";}
    
    function handleBranchChange(){
      const nb=document.getElementById("branchSelector").value;
      if(currentUser.role!=="Admin"&&currentUser.branch&&nb!==currentUser.branch){
        if(!confirm("Branch override — you are assigned to: "+currentUser.branch+" — ordering for: "+nb+"\n\nContinue?")){document.getElementById("branchSelector").value=selectedBranch;return;}
      }
      selectedBranch=nb;fetchDeliveries();
    }
    
    async function fetchDeliveries(){
      if(!selectedBranch)return;
      document.getElementById("viewReceive").innerHTML=`<div class="loading">${t("loading")||"Loading…"}</div>`;
      document.getElementById("historyContent").innerHTML=`<div class="loading">${t("loading")||"Loading…"}</div>`;
      try{
        const[pending,history]=await Promise.all([callGAS("getPendingReceivingForBranch",{branch:selectedBranch}),callGAS("getOrderHistory",{branch:selectedBranch})]);
        pendingDeliveries=pending;renderReceiveView(pending);renderHistory(history);
      }catch(err){document.getElementById("viewReceive").innerHTML=`<div class="loading">Error.</div>`;}
    }
    
    function switchTab(tab){
      document.getElementById("tabOrder").classList.toggle("active",tab==="order");
      document.getElementById("tabReceive").classList.toggle("active",tab==="receive");
      document.getElementById("viewOrder").style.display=tab==="order"?"block":"none";
      document.getElementById("viewReceive").style.display=tab==="receive"?"block":"none";
      
      document.getElementById("floatingReviewBtn").style.display=tab==="order"&&!isShowingHistory?"flex":"none";
      document.getElementById("floatingConfirmBtn").style.display=tab==="receive"&&!isShowingHistory?"flex":"none";
    }
    
    function toggleHistory(){
      isShowingHistory=!isShowingHistory;
      document.getElementById("mainArea").style.display=isShowingHistory?"none":"block";
      document.getElementById("viewHistory").style.display=isShowingHistory?"block":"none";
      document.getElementById("btnToggleHistory").textContent=isShowingHistory?t("back_ordering"):t("view_history");
      document.getElementById("floatingReviewBtn").style.display="none";
      document.getElementById("floatingConfirmBtn").style.display="none";
      if(!isShowingHistory) switchTab(document.getElementById("tabOrder").classList.contains("active")?"order":"receive");
    }
    
    function renderOrderMenu(){
      let cats=["ALL"];
      masterProducts.forEach(p=>{const c=(p[3]||"Uncategorized").trim();if(!cats.includes(c))cats.push(c);});
      let html=`<input type="text" id="searchInput" class="search-input" placeholder="${t('search')}" oninput="filterProducts()">`;
      html+=`<div class="chips">`;
      cats.forEach(c=>{const safe=c.replace(/[^a-zA-Z0-9]/g,"");html+=`<div class="chip ${c==="ALL"?"active":""}" id="chip-${safe}" onclick="setCategory('${c}')">${c}</div>`;});
      html+=`</div><div class="ios-list-group" id="productList">`;
      masterProducts.forEach((p,i)=>{
        const cat=(p[3]||"Uncategorized").trim();
        const imgHtml=p[4]?`<img src="${p[4]}" class="prod-img">`:`<div class="prod-img"></div>`;
        const descHtml=p[2]?`<div class="prod-desc">${p[2]}</div>`:"";
        html+=`<div class="ios-list-item item-card" data-name="${(p[1]||"").toLowerCase()}" data-cat="${cat}">
                 ${imgHtml}
                 <div class="prod-info"><div class="prod-name">${p[1]}</div>${descHtml}</div>
                 <input type="number" id="qty-${i}" class="input-minimal" placeholder="0" inputmode="numeric" min="0">
               </div>`;
      });
      html+=`</div>`;
      document.getElementById("viewOrder").innerHTML=html;
    }
    
    function setCategory(cat){
      filterCat=cat;
      document.querySelectorAll(".chip").forEach(el=>el.classList.remove("active"));
      document.getElementById("chip-"+cat.replace(/[^a-zA-Z0-9]/g,""))?.classList.add("active");
      filterProducts();
    }
    
    function filterProducts(){
      const q=(document.getElementById("searchInput")?.value||"").toLowerCase();
      document.querySelectorAll(".item-card").forEach(card=>{card.style.display=(card.dataset.name.includes(q)&&(filterCat==="ALL"||card.dataset.cat===filterCat))?"flex":"none";});
    }
    
    function reviewOrder(){
      pendingOrderData=[];let total=0,html="";
      masterProducts.forEach((p,i)=>{const qty=parseInt(document.getElementById("qty-"+i)?.value);if(qty>0){pendingOrderData.push({name:p[1],qty});total+=qty;html+=`<div class="ios-list-item"><span class="prod-name">${p[1]}</span><span style="font-size:16px; font-weight:600;">${qty}</span></div>`;}});
      if(!pendingOrderData.length){alert("Please enter at least one quantity.");return;}
      document.getElementById("modalList").innerHTML=html;
      document.getElementById("reviewModal").classList.add("open");
    }
    function closeModal(){document.getElementById("reviewModal").classList.remove("open");}
    
    async function confirmOrder(){
      const btn=document.getElementById("btnConfirm");btn.textContent=t("sending");btn.disabled=true;
      const isUrgent = document.getElementById("urgentCheck")?.checked || false;
      try{
        const msg=await callGAS("processOrder",{orderData:pendingOrderData,userInfo:{name:currentUser.name,pin},targetBranch:selectedBranch, isUrgent: isUrgent});
        closeModal();alert(msg);
        if(document.getElementById("urgentCheck")) document.getElementById("urgentCheck").checked = false;
        masterProducts.forEach((_,i)=>{const el=document.getElementById("qty-"+i);if(el)el.value="";});
        await fetchDeliveries();switchTab("receive");
      }catch(err){alert("Error: "+err.message);}
      btn.textContent=t("confirm_send");btn.disabled=false;
    }

    function getStatusInfo(status){
      const map={
        "":"gray", "PENDING":"gray",
        "SENT":"blue",
        "ON THE WAY":"orange",
        "STAFF VERIFIED":"green","CHEF CONFIRMED":"green",
        "DELIVERED":"green","RECEIVED":"green"
      };
      const cls=map[status]||"gray";
      const labels={ "":"Pending", "PENDING":"Pending", "SENT":"Prepping", "ON THE WAY":"On the way", "STAFF VERIFIED":"Confirmed", "CHEF CONFIRMED":"Confirmed", "DELIVERED":"Delivered" };
      return { cls: `status-${cls}`, text: labels[status]||status };
    }

    function renderReceiveView(data){
      const container=document.getElementById("viewReceive");
      if(!data.length){container.innerHTML=`<div class="loading">${t("no_active")}</div>`; document.getElementById("floatingConfirmBtn").style.display="none"; return;}
      const grouped={};
      data.forEach((item,idx)=>{item._idx=idx;if(!grouped[item.id])grouped[item.id]={id:item.id,date:item.date,orderedBy:item.orderedBy,items:[]};grouped[item.id].items.push(item);});
      let hasReceivable=false,html="";
      
      html+=`<div class="ios-list-group" style="margin-bottom:12px;"><label class="ios-list-item" style="cursor:pointer;"><span style="font-size:15px;">Select All</span><input type="checkbox" id="selectAll" checked onchange="toggleSelectAll(this)" style="width:20px;height:20px;accent-color:var(--blue);"></label></div>`;
      
      for(const key in grouped){
        const grp=grouped[key],safeId=key.replace(/[^a-zA-Z0-9]/g,"");
        const status=grp.items[0].status,isPending=status===""||status==="PENDING",isPrepping=status==="SENT";
        if(!isPending&&!isPrepping)hasReceivable=true;
        const sInfo = getStatusInfo(status);
        
        const actionBtn=isPending?`<button class="nav-btn" id="editBtn-${safeId}" onclick="toggleEdit('${safeId}')">${t("edit")}</button>`:``;
        const chkHtml=(!isPending&&!isPrepping)?`<input type="checkbox" id="chk-${safeId}" class="indv-chk" checked style="width:20px;height:20px;accent-color:var(--blue);">`:"";
        
        html+=`<div class="ios-list-group">
                 <div style="background:#f9f9f9; padding:12px 16px; border-bottom:0.5px solid var(--border); display:flex; align-items:center; justify-content:space-between;">
                   <div style="display:flex; align-items:center; gap:12px;">
                     ${chkHtml}
                     <div>
                       <div style="font-size:14px; font-weight:600;">${grp.id}</div>
                       <div class="status-text ${sInfo.cls}">${sInfo.text}</div>
                     </div>
                   </div>
                   ${actionBtn}
                 </div>
                 <div id="det-${safeId}">`;
        grp.items.forEach(item=>{
          html+=`<div class="ios-list-item">
                   <div class="prod-name">${item.item}</div>`;
          if(!isPending) {
             html+=`<input type="number" id="recQty-${item._idx}" class="input-minimal" value="${item.qty}">`;
          } else {
             html+=`<div id="dispQty-${item._idx}" style="font-size:16px; font-weight:600;">${item.qty}</div>
                    <input type="number" id="editQty-${item._idx}" class="input-minimal edit-input-${safeId}" data-rownum="${item.rowNum}" value="${item.qty}" style="display:none;">`;
          }
          html+=`</div>`;
        });
        html+=`</div></div>`;
      }
      container.innerHTML=html;
      if(hasReceivable && !isShowingHistory) document.getElementById("floatingConfirmBtn").style.display="flex";
    }
    
    function toggleSelectAll(box){document.querySelectorAll(".indv-chk").forEach(c=>c.checked=box.checked);}
    
    function toggleEdit(safeId){
      const btn=document.getElementById("editBtn-"+safeId),inputs=document.querySelectorAll(".edit-input-"+safeId);
      if(btn.textContent===t("edit")||btn.textContent==="Edit"){
        btn.textContent=t("save"); btn.style.fontWeight="600";
        inputs.forEach(inp=>{document.getElementById("dispQty-"+inp.id.split("-")[1]).style.display="none";inp.style.display="block";});
      }else{
        btn.textContent=t("saving");btn.disabled=true;
        const updates=Array.from(inputs).map(inp=>({rowNum:inp.dataset.rownum,qty:parseInt(inp.value)||0}));
        callGAS("updatePendingOrder",{payload:{updates},userInfo:{name:currentUser.name,pin}})
          .then(msg=>{alert(msg);fetchDeliveries();})
          .catch(err=>{alert("Error: "+err.message);btn.textContent=t("save");btn.disabled=false;});
      }
    }
    
    async function submitReceipt(specificSafeId){
      const receiptData=[];
      pendingDeliveries.forEach(item=>{
        if(item.status!=="ON THE WAY")return;
        const isTarget=specificSafeId?item.id.replace(/[^a-zA-Z0-9]/g,"")===specificSafeId:document.getElementById("chk-"+item.id.replace(/[^a-zA-Z0-9]/g,""))?.checked;
        if(isTarget){const qty=parseInt(document.getElementById("recQty-"+item._idx)?.value);if(!isNaN(qty))receiptData.push({rowNum:item.rowNum,item:item.item,receivedQty:qty});}
      });
      if(!receiptData.length){alert("No dispatched orders to confirm yet.");return;}
      const btn = document.querySelector('#floatingConfirmBtn button');
      if(btn){btn.textContent="...";btn.disabled=true;}
      try{const msg=await callGAS("submitReceiving",{payload:receiptData,userInfo:{name:currentUser.name,pin}});alert(msg);fetchDeliveries();}
      catch(err){alert("Error: "+err.message);if(btn){btn.textContent=t("confirm_selected");btn.disabled=false;}}
    }
    
    function renderHistory(data){
      const container=document.getElementById("historyContent");
      if(!data.length){container.innerHTML=`<div class="loading">${t("no_history")}</div>`;return;}
      const grouped={};
      data.forEach(item=>{if(!grouped[item.id])grouped[item.id]={time:item.receivedAt,driver:item.driver,items:[]};grouped[item.id].items.push(item);});
      container.innerHTML=Object.entries(grouped).map(([oId,order])=>`
        <div class="ios-list-group">
          <div style="background:#f9f9f9; padding:12px 16px; border-bottom:0.5px solid var(--border); display:flex; justify-content:space-between;">
             <div>
               <div style="font-weight:600; font-size:14px;">${oId}</div>
               <div style="font-size:12px; color:var(--text-muted);">${order.time}</div>
             </div>
             <div class="status-text status-green">Received</div>
          </div>
          ${order.items.map(sub=>`<div class="ios-list-item"><span class="prod-name">${sub.item}</span><span style="font-weight:600;">${sub.qty}</span></div>`).join("")}
        </div>`).join("");
    }
    init();
  </script>
</body>
</html>
