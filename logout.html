<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>[COMPANY_NAME] — Logged Out</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f5f0e8;--surface:#fdfaf5;--surface-2:#f0ebe0;--text:#2c1f14;--text-muted:#9c8870;--border:#e0d5c5;--border-soft:#ede8de;--brand:#5c3d2e;--green:#5a7c5a;--green-bg:#eef3ee;--green-border:#b8d0b8;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:360px;overflow:hidden;box-shadow:0 4px 24px rgba(44,31,20,0.07);text-align:center;position:relative;}
    .lang-toggle{position:absolute;top:14px;right:14px;display:flex;background:var(--surface-2);border:1px solid var(--border);border-radius:16px;padding:3px;gap:2px;}
    .lang-btn{padding:3px 8px;border-radius:12px;font-size:10px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text-muted);transition:all 0.15s;}
    .lang-btn.active{background:var(--brand);color:#fdfaf5;}
    .card-top{padding:36px 32px 28px;border-bottom:1px solid var(--border-soft);}
    .check-wrap{width:56px;height:56px;border-radius:50%;background:var(--green-bg);border:1px solid var(--green-border);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:22px;color:var(--green);}
    .title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--text);margin-bottom:8px;}
    .subtitle{font-size:13px;color:var(--text-muted);line-height:1.6;}
    .card-body{padding:24px 32px 32px;}
    .btn{width:100%;height:50px;background:var(--brand);color:#fdfaf5;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity 0.15s,transform 0.15s;}
    .btn:active{transform:scale(0.98);opacity:0.85;}
    .footer{padding:0 32px 20px;font-size:10px;font-weight:500;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;}
  </style>
</head>
<body>
  <div class="card">
    <div class="lang-toggle">
      <button class="lang-btn active" id="btnEN" onclick="setLang('en')">EN</button>
      <button class="lang-btn" id="btnTH" onclick="setLang('th')">TH</button>
    </div>
    <div class="card-top">
      <div class="check-wrap"></div>
      <div class="title" id="txt_title">Logged out</div>
      <div class="subtitle" id="txt_subtitle">Your session has been safely closed. You can close this window or return to the login page.</div>
    </div>
    <div class="card-body">
      <button class="btn" id="btn_return" onclick="window.location.href='index.html'">Return to login</button>
    </div>
    <div class="footer">[COMPANY_NAME]</div>
  </div>
  <script>
    sessionStorage.clear();
    const T={
      en:{title:"Logged out",subtitle:"Your session has been safely closed. You can close this window or return to the login page.",btn:"Return to login"},
      th:{title:"",subtitle:" ",btn:""}
    };
    function setLang(lang){
      document.getElementById("btnEN").classList.toggle("active",lang==="en");
      document.getElementById("btnTH").classList.toggle("active",lang==="th");
      document.getElementById("txt_title").textContent=T[lang].title;
      document.getElementById("txt_subtitle").textContent=T[lang].subtitle;
      document.getElementById("btn_return").textContent=T[lang].btn;
    }
    setLang("en");
  </script>
</body>
</html>
