<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>[COMPANY_NAME] — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f2f2f7; --surface: #ffffff;
      --text: #000000; --text-muted: #8e8e93; --border: #c6c6c8;
      --blue: #007aff; --red: #ff3b30; --green: #34c759; --orange: #ff9500;
      --brand: #1a1f2e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Plus Jakarta Sans", sans-serif; background: var(--bg); color: var(--text); padding-bottom: 80px; }
    
    .ios-nav { background: var(--surface); display: flex; justify-content: space-between; align-items: center; height: 50px; padding: 0 16px; position: sticky; top: 0; z-index: 100; border-bottom: 0.5px solid var(--border); }
    .nav-left, .nav-right { display: flex; align-items: center; gap: 12px; flex: 1; }
    .nav-right { justify-content: flex-end; }
    .nav-title { font-weight: 600; font-size: 17px; text-align: center; flex: 2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; flex-direction: column; line-height: 1.2; }
    .nav-tag { font-size: 10px; color: var(--text-muted); font-weight: 500; }
    .nav-btn { background: none; border: none; font-size: 15px; font-weight: 500; cursor: pointer; color: var(--blue); }
    .nav-btn.text-red { color: var(--red); }
    
    .content { padding: 16px; max-width: 600px; margin: 0 auto; }
    .section-header { font-size: 13px; color: var(--text-muted); text-transform: uppercase; margin: 24px 0 8px 16px; font-weight: 500; }
    
    .ios-list-group { background: var(--surface); border-radius: 10px; margin-bottom: 24px; overflow: hidden; }
    .ios-list-item { padding: 12px 16px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .ios-list-item:last-child { border-bottom: none; }
    
    .branch-header { background: #e5e5ea; padding: 12px 16px; font-weight: 600; font-size: 15px; display: flex; justify-content: space-between; cursor: pointer; }
    .badge-count { background: var(--text-muted); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 12px; font-weight: 600; }
    
    .item-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .item-title { font-size: 15px; font-weight: 500; }
    .item-subtitle { font-size: 13px; color: var(--text-muted); }
    .item-urgent { color: var(--red); font-weight: 600; font-size: 11px; }
    
    .input-minimal { background: #e5e5ea; border: none; border-radius: 6px; padding: 6px; font-size: 16px; font-weight: 600; text-align: center; width: 56px; outline: none; }
    .input-minimal:focus { background: #d1d1d6; }
    
    input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--blue); }
    
    .add-bar { display: flex; gap: 8px; padding: 12px 16px; background: var(--surface); border-top: 0.5px solid var(--border); }
    .add-select { flex: 1; border: none; background: #e5e5ea; border-radius: 6px; padding: 8px 12px; font-size: 15px; outline: none; }
    
    .note-area { width: 100%; border: none; background: transparent; padding: 16px; font-size: 15px; min-height: 100px; outline: none; resize: vertical; }
    
    .floating-bottom { position: fixed; bottom: 0; left: 0; right: 0; padding: 16px; background: rgba(242,242,247,0.9); backdrop-filter: blur(10px); border-top: 0.5px solid var(--border); display: flex; justify-content: center; z-index: 100; }
    .btn-ios { background: var(--blue); color: #fff; border: none; border-radius: 12px; font-size: 17px; font-weight: 600; padding: 14px; width: 100%; max-width: 600px; cursor: pointer; transition: opacity 0.2s; }
    .btn-ios:active { opacity: 0.8; }
    .btn-ios:disabled { opacity: 0.5; }
    .btn-ios.btn-red { background: var(--red); }
    
    .loading { padding: 32px; text-align: center; color: var(--text-muted); font-size: 15px; }
  </style>
</head>
<body>
  <nav class="ios-nav">
    <div class="nav-left">
      <button class="nav-btn" id="btnEN" onclick="setLang('en')" style="font-weight:600;">EN</button>
      <button class="nav-btn" id="btnTH" onclick="setLang('th')">TH</button>
    </div>
    <div class="nav-title">[COMPANY_NAME] <span class="nav-tag" id="nav_tag">Admin Portal</span></div>
    <div class="nav-right">
      <button class="nav-btn text-red" id="btn_logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="content">
    <div class="section-header" id="txt_pending">Pending Orders</div>
    <div id="ordersContainer"><div class="loading">Loading…</div></div>
    
    <div class="section-header" id="txt_instructions">Kitchen Instructions</div>
    <div class="ios-list-group">
      <textarea class="note-area" id="chefNote" placeholder="e.g. Please prioritise central branch delivery today..."></textarea>
    </div>
  </div>

  <div class="floating-bottom">
    <button class="btn-ios btn-red" id="btnSend" onclick="submitUpdates()">Process & Send PDF</button>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxxYwYzml0eTiKjYERhcVKmgjeqP7x3rQrgpOTewhFrtH6BGUFEUh7-Da_EX6tnzJF75Q/exec";
    
    const T={
      en:{nav_tag:"Admin Portal",logout:"Logout",pending:"Pending Orders",instructions:"Kitchen Instructions",process_send:"Process & Send PDF",processing:"Processing…",select_all:"Select All",no_pending:"No pending orders",add_item_to:"Add Item",admin_adhoc:"Ad-Hoc Additions",requested:"Req",undo:"Undo",by:"By",items:"items",loading:"Loading…"},
      th:{nav_tag:"",logout:"",pending:"",instructions:"",process_send:" PDF",processing:"…",select_all:"",no_pending:"",add_item_to:"",admin_adhoc:"",requested:"",undo:"",by:"",items:"",loading:"…"}
    };
    let currentLang=sessionStorage.getItem("lova_lang")||"en";
    const pin=sessionStorage.getItem("lova_pin")||"";
    if(!pin)window.location.href="index.html";
    
    let adminName="",pendingList=[],productsList=[],adHocList=[],openAdders={};
    const ALL_BRANCHES=["[BRANCH_1]", "[BRANCH_2]", "[BRANCH_3]", "[BRANCH_4]", "[BRANCH_5]"];
    
    function t(k){return T[currentLang][k]||T.en[k]||k;}
    function setLang(lang){
      currentLang=lang;sessionStorage.setItem("lova_lang",lang);
      document.getElementById("btnEN").style.fontWeight = lang === 'en' ? '600' : '400';
      document.getElementById("btnTH").style.fontWeight = lang === 'th' ? '600' : '400';
      document.getElementById("nav_tag").textContent=t("nav_tag");
      document.getElementById("btn_logout").textContent=t("logout");
      document.getElementById("txt_pending").textContent=t("pending");
      document.getElementById("txt_instructions").textContent=t("instructions");
      document.getElementById("btnSend").textContent=t("process_send");
      renderOrders();
    }

    async function callGAS(action,params={}){
      const res=await fetch(GAS_URL+"?callback=_",{method:"POST",body:JSON.stringify({action,...params}),headers:{"Content-Type":"text/plain"}});
      const data=await res.json();if(data.error)throw new Error(data.error);return data.result;
    }
    async function init(){
      try{adminName=await callGAS("verifyAdmin",{pin}); setLang(currentLang);await loadData();}
      catch(err){alert("Session error: "+err.message);window.location.href="index.html";}
    }
    function logout(){sessionStorage.clear();window.location.href="logout.html?src=admin";}
    
    async function loadData(){
      document.getElementById("ordersContainer").innerHTML=`<div class="loading">${t("loading")}</div>`;
      try{const data=await callGAS("getAdminInitData");pendingList=data.pending;productsList=data.products;renderOrders();}
      catch(err){document.getElementById("ordersContainer").innerHTML=`<div class="loading">Failed.</div>`;}
    }
    
    function toggleAccordion(id){
      const body=document.getElementById("body-"+id);
      if(!body)return;
      body.style.display=body.style.display==="none"?"block":"none";
    }
    function toggleAdminSelectAll(box){document.querySelectorAll(".admin-chk").forEach(c=>c.checked=box.checked);}
    function toggleGroupCheckboxes(safeOrdId,box){document.querySelectorAll(".grp-"+safeOrdId).forEach(c=>c.checked=box.checked);}
    
    function renderOrders(){
      const container=document.getElementById("ordersContainer");
      const hasAny=pendingList.length>0||adHocList.length>0;
      let html="";
      if(hasAny){
        html+=`<div class="ios-list-group"><label class="ios-list-item" style="cursor:pointer;"><span style="font-size:15px;">${t("select_all")}</span><input type="checkbox" id="selectAll" onclick="toggleAdminSelectAll(this)" checked class="admin-chk"></label></div>`;
      }
      const prodOptions=`<option value="" disabled selected>Select product…</option>`+productsList.map(p=>`<option value="${p}">${p}</option>`).join("");
      
      const branches=[...ALL_BRANCHES];
      pendingList.forEach(o=>{if(!branches.includes(o.branch))branches.push(o.branch);});
      
      branches.forEach(branch=>{
        const bPending=pendingList.filter(o=>o.branch===branch);
        const bAdHoc=adHocList.filter(a=>a.branch===branch);
        const total=bPending.length+bAdHoc.length;
        const safeBranch=branch.replace(/[^a-zA-Z0-9]/g,"");
        
        html+=`<div class="ios-list-group">
                 <div class="branch-header" onclick="toggleAccordion('br-${safeBranch}')">
                   <span>${branch}</span>
                   <span class="badge-count">${total}</span>
                 </div>
                 <div id="body-br-${safeBranch}">`;
        
        if(total===0){
          html+=`<div class="loading" style="padding:16px;">${t("no_pending")}</div>`;
        } else {
          const ordersMap={};
          bPending.forEach(o=>{if(!ordersMap[o.orderId])ordersMap[o.orderId]={date:o.date,orderedBy:o.orderedBy,items:[]};ordersMap[o.orderId].items.push(o);});
          for(const ordId in ordersMap){
            const ord=ordersMap[ordId],safeOrdId=ordId.replace(/[^a-zA-Z0-9]/g,"");
            html+=`<div style="background:#f9f9f9; padding:8px 16px; border-bottom:0.5px solid var(--border); display:flex; align-items:center; gap:12px;">
                     <input type="checkbox" class="admin-chk" id="chk-ord-${safeOrdId}" onchange="toggleGroupCheckboxes('${safeOrdId}',this)" checked>
                     <div style="flex:1; font-size:12px; color:var(--text-muted);">${ordId} · ${t("by")} ${ord.orderedBy}</div>
                   </div>`;
            ord.items.forEach(order=>{
              const isUrgent = order.remark && order.remark.includes(" URGENT");
              const urgHtml = isUrgent ? `<div class="item-urgent">URGENT</div>` : ``;
              html+=`<div class="ios-list-item">
                       <div style="display:flex; align-items:center; gap:12px; flex:1;">
                         <input type="checkbox" id="chk-row-${order.rowNum}" class="admin-chk grp-${safeOrdId}" checked>
                         <div class="item-info">
                           <div class="item-title">${order.item}</div>
                           ${urgHtml}
                         </div>
                       </div>
                       <input type="number" id="qty-row-${order.rowNum}" class="input-minimal" value="${order.qty}">
                     </div>`;
            });
          }
          if(bAdHoc.length>0){
             html+=`<div style="background:#f2fdf5; padding:8px 16px; border-bottom:0.5px solid var(--border); font-size:12px; color:var(--green); font-weight:600;">${t("admin_adhoc")}</div>`;
             bAdHoc.forEach(a=>{
               const urgHtml = a.isUrgent ? `<span class="item-urgent" style="margin-left:8px;">URGENT</span>` : '';
               html+=`<div class="ios-list-item">
                        <div style="display:flex; align-items:center; gap:12px; flex:1;">
                           <input type="checkbox" id="chk-adhoc-${a.id}" class="admin-chk" checked>
                           <div class="item-title">${a.item}${urgHtml}</div>
                        </div>
                        <div style="display:flex; align-items:center; gap:12px;">
                           <div style="font-size:17px; font-weight:600;">${a.qty}</div>
                           <button class="nav-btn text-red" style="font-size:13px;" onclick="removeAdHoc('${a.id}')">${t("undo")}</button>
                        </div>
                      </div>`;
             });
          }
        }
        
        if(openAdders[safeBranch]){
          html+=`<div class="add-bar">
                   <select id="new-item-${safeBranch}" class="add-select">${prodOptions}</select>
                   <input type="number" id="new-qty-${safeBranch}" class="input-minimal" placeholder="Qty">
                 </div>
                 <div class="add-bar" style="justify-content:space-between; border-top:none; padding-top:0;">
                   <label style="display:flex; align-items:center; gap:8px; font-size:13px; color:var(--red); font-weight:600;">
                     <input type="checkbox" id="new-urg-${safeBranch}"> URGENT
                   </label>
                   <button class="nav-btn" style="font-weight:600;" onclick="addAdHoc('${branch}','${safeBranch}')">Save</button>
                 </div>`;
        } else {
          html+=`<button class="nav-btn" style="width:100%; padding:14px; text-align:center; display:block;" onclick="openAdder('${safeBranch}')">+ ${t("add_item_to")}</button>`;
        }
        
        html+=`</div></div>`;
      });
      container.innerHTML=html;
    }
    
    function openAdder(safeBranch){openAdders[safeBranch]=true;renderOrders();}
    
    function addAdHoc(branch,safeBranch){
      const item=document.getElementById("new-item-"+safeBranch)?.value;
      const qty=parseInt(document.getElementById("new-qty-"+safeBranch)?.value);
      const isUrgent=document.getElementById("new-urg-"+safeBranch)?.checked || false;
      if(!item||!qty||qty<=0){alert("Please select a product and enter a valid quantity.");return;}
      adHocList.push({id:"adhoc_"+Date.now(),branch,item,qty,isUrgent});openAdders[safeBranch]=false;renderOrders();
    }
    function removeAdHoc(id){adHocList=adHocList.filter(a=>a.id!==id);renderOrders();}
    
    async function submitUpdates(){
      const updates=[];
      pendingList.forEach(order=>{
        if(document.getElementById("chk-row-"+order.rowNum)?.checked){
          const newQty=parseInt(document.getElementById("qty-row-"+order.rowNum)?.value);
          if(!isNaN(newQty))updates.push({rowNum:order.rowNum,item:order.item,branch:order.branch,originalQty:order.qty,newQty,isNew:false,orderId:order.orderId,orderedBy:order.orderedBy,originalRemark:order.remark});
        }
      });
      adHocList.forEach(a=>{if(document.getElementById("chk-adhoc-"+a.id)?.checked)updates.push({branch:a.branch,item:a.item,newQty:a.qty,isNew:true,isUrgent:a.isUrgent});});
      if(!updates.length){alert("Please select at least one order to process.");return;}
      
      const note=document.getElementById("chefNote").value;
      const btn=document.getElementById("btnSend");btn.textContent=t("processing");btn.disabled=true;
      try{
        const msg=await callGAS("updateAndForceSend",{payload:{updates,note,userInfo:{name:adminName,pin}}});
        alert(msg);adHocList=[];document.getElementById("chefNote").value="";await loadData();
      }catch(err){alert("Error: "+err.message);}
      btn.textContent=t("process_send");btn.disabled=false;
    }
    init();
  </script>
</body>
</html>
