<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>[COMPANY_NAME] — Branch Ordering</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f0e8; --surface: #fdfaf5; --surface-2: #f0ebe0;
      --text: #2c1f14; --text-muted: #9c8870;
      --border: #e0d5c5; --border-soft: #ede8de;
      --brand: #5c3d2e; --brand-light: #8b6347; --accent: #c8956c;
      --red: #b85c4a; --green: #5a7c5a; --orange: #c8834a; --blue: #6b7fa3;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    
    .login-container { width: 100%; max-width: 360px; }
    .header-text { text-align: center; margin-bottom: 36px; }
    .company-title { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 700; letter-spacing: 2px; margin-bottom: 6px; color: var(--brand); }
    .system-title { font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; }
    
    .ios-card { background: var(--surface); border-radius: 14px; overflow: hidden; margin-bottom: 16px; border: 1px solid var(--border); }
    .ios-list-item { padding: 12px 16px; border-bottom: 1px solid var(--border-soft); display: flex; align-items: center; justify-content: space-between; }
    .ios-list-item:last-child { border-bottom: none; }
    
    .pin-input { width: 100%; border: none; font-size: 26px; font-weight: 600; letter-spacing: 10px; text-align: center; outline: none; padding: 18px; font-family: monospace; background: transparent; color: var(--brand); }
    .pin-input::placeholder { color: var(--border); letter-spacing: 10px; }
    .pin-input.shake { color: var(--red); animation: shake 0.35s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 60%{transform:translateX(6px)} }
    
    .error-msg { font-size: 13px; color: var(--red); text-align: center; min-height: 18px; margin-bottom: 14px; font-weight: 500; }
    
    .btn-ios { background: var(--brand); color: #fdfaf5; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; padding: 15px; width: 100%; cursor: pointer; transition: background 0.2s, opacity 0.2s; font-family: 'DM Sans', sans-serif; letter-spacing: 0.5px; }
    .btn-ios:active { background: var(--brand-light); }
    .btn-ios:disabled { opacity: 0.45; }
    
    .lang-toggle { display: flex; justify-content: center; gap: 16px; margin-top: 24px; }
    .lang-btn { background: none; border: none; font-size: 13px; color: var(--text-muted); font-weight: 500; cursor: pointer; letter-spacing: 0.5px; }
    .lang-btn.active { color: var(--brand); font-weight: 600; }

    #adminHub { display: none; }
    .hub-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 600; margin-bottom: 4px; color: var(--brand); }
    .hub-subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
    .portal-btn { background: var(--surface); border-radius: 12px; padding: 16px; display: flex; align-items: center; gap: 14px; margin-bottom: 10px; border: 1px solid var(--border); width: 100%; text-align: left; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
    .portal-btn:active { background: var(--surface-2); border-color: var(--brand-light); }
    .portal-icon { font-size: 18px; width: 30px; text-align: center; }
    .portal-text { flex: 1; }
    .portal-name { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .portal-desc { font-size: 12px; color: var(--text-muted); }
    .portal-arrow { color: var(--border); font-size: 18px; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="header-text">
      <div class="company-title">[COMPANY_NAME]</div>
      <div class="system-title" id="txt_system">Branch Ordering System</div>
    </div>

    <div id="loginView">
      <div class="ios-card">
        <input type="password" id="universalPin" class="pin-input" placeholder="••••" inputmode="numeric" pattern="[0-9]*" maxlength="6" autocomplete="off">
      </div>
      <div class="error-msg" id="errorMsg"></div>
      <button class="btn-ios" id="btnEnter" onclick="verifyLogin()">Authenticate</button>
      
      <div class="lang-toggle">
        <button class="lang-btn active" id="btnEN" onclick="setLang('en')">English</button>
        <button class="lang-btn" id="btnTH" onclick="setLang('th')">ภาษาไทย</button>
      </div>
    </div>

    <div id="adminHub">
      <div class="hub-title" id="welcomeName">Welcome</div>
      <div class="hub-subtitle" id="txt_select_portal">Select your portal to continue</div>
      
      <button class="portal-btn" onclick="goTo('staff', this)">
        <div class="portal-icon">🍳</div>
        <div class="portal-text"><div class="portal-name" id="txt_staff_title">Kitchen Staff</div><div class="portal-desc" id="txt_staff_desc">Place and track orders</div></div>
        <div class="portal-arrow">›</div>
      </button>
      
      <button class="portal-btn" onclick="goTo('driver', this)">
        <div class="portal-icon">🚚</div>
        <div class="portal-text"><div class="portal-name" id="txt_driver_title">Driver Dispatch</div><div class="portal-desc" id="txt_driver_desc">Manage deliveries</div></div>
        <div class="portal-arrow">›</div>
      </button>
      
      <button class="portal-btn" onclick="goTo('admin', this)">
        <div class="portal-icon">⚙️</div>
        <div class="portal-text"><div class="portal-name" id="txt_admin_title">Admin Control</div><div class="portal-desc" id="txt_admin_desc">Review and edit orders</div></div>
        <div class="portal-arrow">›</div>
      </button>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxxYwYzml0eTiKjYERhcVKmgjeqP7x3rQrgpOTewhFrtH6BGUFEUh7-Da_EX6tnzJF75Q/exec";
    
    const T = {
      en: { system:"Branch Ordering System", pin_label:"Access PIN", authenticate:"Authenticate", verifying:"Verifying…", select_portal:"Select your portal to continue", staff_title:"Kitchen Staff", staff_desc:"Place and track branch orders", driver_title:"Driver Dispatch", driver_desc:"Manage deliveries and manifests", admin_title:"Admin Control", admin_desc:"Review, edit and dispatch orders", welcome:"Welcome, " },
      th: { system:"", pin_label:"", authenticate:"", verifying:"…", select_portal:"", staff_title:"", staff_desc:"", driver_title:"", driver_desc:"", admin_title:"", admin_desc:"  ", welcome:", " }
    };
    let currentLang = sessionStorage.getItem("lova_lang") || "en";
    let userPin = "";
    
    function setLang(lang) {
      currentLang = lang; sessionStorage.setItem("lova_lang", lang);
        document.getElementById("btnEN").classList.toggle("active", lang==="en");
      document.getElementById("btnTH").classList.toggle("active", lang==="th");
      const t = T[lang];
      document.getElementById("txt_system").textContent = t.system;
      document.getElementById("btnEnter").textContent = t.authenticate;
      document.getElementById("txt_select_portal").textContent = t.select_portal;
      document.getElementById("txt_staff_title").textContent = t.staff_title;
      document.getElementById("txt_staff_desc").textContent = t.staff_desc;
      document.getElementById("txt_driver_title").textContent = t.driver_title;
      document.getElementById("txt_driver_desc").textContent = t.driver_desc;
      document.getElementById("txt_admin_title").textContent = t.admin_title;
      document.getElementById("txt_admin_desc").textContent = t.admin_desc;
    }
    setLang(currentLang);
    
    document.getElementById("universalPin").addEventListener("keyup", e => {
      if (e.key === "Enter") verifyLogin();
      document.getElementById("errorMsg").textContent = "";
      e.target.classList.remove("shake");
    });
    
    async function callGAS(action, params={}) {
      const res = await fetch(GAS_URL+"?callback=_", { method:"POST", body:JSON.stringify({action,...params}), headers:{"Content-Type":"text/plain"} });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      return data.result;
    }
    
    async function verifyLogin() {
      userPin = document.getElementById("universalPin").value.trim();
      if (!userPin) return;
      const btn = document.getElementById("btnEnter");
      btn.textContent = T[currentLang].verifying; btn.disabled = true;
      try {
        const user = await callGAS("universalVerify", {pin: userPin});
        if (user.role === "Admin") {
          document.getElementById("loginView").style.display = "none";
          document.getElementById("adminHub").style.display = "block";
          document.getElementById("welcomeName").textContent = T[currentLang].welcome + user.name.split(" ")[0];
          btn.textContent = T[currentLang].authenticate; btn.disabled = false;
        } else {
          sessionStorage.setItem("lova_pin", userPin);
          window.location.href = user.role === "Driver" ? "driver.html" : "staff.html";
        }
      } catch(err) {
        document.getElementById("errorMsg").textContent = err.message;
        const inp = document.getElementById("universalPin");
        inp.classList.add("shake"); inp.value = "";
        btn.textContent = T[currentLang].authenticate; btn.disabled = false;
      }
    }
    
    function goTo(mode, btn) {
      if (btn) { btn.style.opacity = "0.55"; btn.disabled = true; }
      sessionStorage.setItem("lova_pin", userPin);
      window.location.href = mode==="admin" ? "admin.html" : mode==="driver" ? "driver.html" : "staff.html";
    }
  </script>
</body>
</html>
