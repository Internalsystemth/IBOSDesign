<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>[COMPANY_NAME] — Driver</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f0e8; --surface: #fdfaf5; --surface-2: #f0ebe0;
      --text: #2c1f14; --text-muted: #9c8870;
      --border: #e0d5c5; --border-soft: #ede8de;
      --brand: #5c3d2e; --brand-light: #8b6347; --accent: #c8956c;
      --red: #b85c4a; --green: #5a7c5a; --orange: #c8834a; --blue: #6b7fa3;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 90px; }
    
    .ios-nav { background: var(--surface); display: flex; justify-content: space-between; align-items: center; height: 52px; padding: 0 16px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
    .nav-left, .nav-right { display: flex; align-items: center; gap: 12px; flex: 1; }
    .nav-right { justify-content: flex-end; }
    .nav-title { font-weight: 600; font-size: 16px; text-align: center; flex: 2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; flex-direction: column; line-height: 1.2; color: var(--brand); }
    .nav-tag { font-size: 10px; color: var(--text-muted); font-weight: 400; letter-spacing: 0.5px; }
    .nav-btn { background: none; border: none; font-size: 14px; font-weight: 500; cursor: pointer; color: var(--brand-light); font-family: 'DM Sans', sans-serif; }
    .nav-btn.text-red { color: var(--red); }
    
    .content { max-width: 600px; margin: 0 auto; padding-top: 16px; }
    
    .ios-segment-group { display: flex; background: var(--surface-2); border-radius: 8px; padding: 2px; margin: 0 16px 16px; border: 1px solid var(--border); }
    .ios-segment { flex: 1; text-align: center; padding: 7px 0; font-size: 13px; font-weight: 500; border-radius: 6px; cursor: pointer; color: var(--text-muted); }
    .ios-segment.active { background: var(--surface); box-shadow: 0 2px 6px rgba(92,61,46,0.1); font-weight: 600; color: var(--brand); }
    
    .ios-list-group { background: var(--surface); border-radius: 10px; margin: 0 16px 20px; overflow: hidden; border: 1px solid var(--border); }
    .ios-list-item { padding: 12px 16px; border-bottom: 1px solid var(--border-soft); display: flex; align-items: center; justify-content: space-between; }
    .ios-list-item:last-child { border-bottom: none; }
    
    .branch-select { width: 100%; border: none; background: transparent; font-size: 15px; outline: none; -webkit-appearance: none; padding: 4px 0; font-family: 'DM Sans', sans-serif; font-weight: 600; color: var(--brand); }
    
    .floating-bottom { position: fixed; bottom: 0; left: 0; right: 0; padding: 14px 16px; background: rgba(245,240,232,0.92); backdrop-filter: blur(12px); border-top: 1px solid var(--border); display: flex; justify-content: center; gap: 12px; z-index: 100; }
    .btn-ios { background: var(--brand); color: #fdfaf5; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; padding: 14px; flex: 1; max-width: 300px; cursor: pointer; transition: opacity 0.2s; font-family: 'DM Sans', sans-serif; }
    .btn-ios:active { opacity: 0.8; }
    .btn-ios:disabled { opacity: 0.35; }
    .btn-ios.btn-orange { background: var(--orange); }
    .btn-ios.btn-green { background: var(--green); }
    
    .status-text { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .status-gray { color: var(--text-muted); }
    .status-blue { color: var(--blue); }
    .status-orange { color: var(--orange); }
    .status-green { color: var(--green); }
    
    input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--brand); }
    .order-checkbox:disabled { opacity: 0.3; }
    
    .loading { padding: 32px; text-align: center; color: var(--text-muted); font-size: 14px; }
  </style>
</head>
<body>
  <nav class="ios-nav">
    <div class="nav-left">
      <button class="nav-btn" id="btnEN" onclick="setLang('en')" style="font-weight:600;">EN</button>
      <button class="nav-btn" id="btnTH" onclick="setLang('th')">TH</button>
    </div>
    <div class="nav-title">[COMPANY_NAME] <span class="nav-tag" id="nav_tag">Driver Portal</span></div>
    <div class="nav-right">
      <button class="nav-btn text-red" id="btn_logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="content">
    <div class="ios-segment-group">
      <div class="ios-segment active" id="tabManifest" onclick="switchTab('manifest')">Active Dispatch</div>
      <div class="ios-segment" id="tabHistory" onclick="switchTab('history')">Past Deliveries</div>
    </div>

    <div id="viewManifest">
      <div class="ios-list-group" id="branchCard" style="display:none; margin-bottom: 16px;">
        <div class="ios-list-item">
          <select id="branchSelector" class="branch-select" onchange="renderSelectedBranch()"></select>
          <button class="nav-btn" onclick="fetchManifest()" style="font-size:20px;">↻</button>
        </div>
      </div>
      <div id="manifestContent"><div class="loading">Loading…</div></div>
    </div>

    <div id="viewHistory" style="display:none;">
      <div id="historyContent"><div class="loading">Loading…</div></div>
    </div>
  </div>

  <script>
    const GAS_URL="https://script.google.com/macros/s/AKfycbxxYwYzml0eTiKjYERhcVKmgjeqP7x3rQrgpOTewhFrtH6BGUFEUh7-Da_EX6tnzJF75Q/exec";
    const T={
      en:{nav_tag:"Driver Portal",logout:"Logout",active_dispatch:"Active Dispatch",past_tab:"Past Deliveries",out_for_delivery:"Out for delivery",set_delivered:"Set Delivered",select_all:"Select All",no_dispatch:"No active dispatch.", updating:"Updating…"},
      th:{nav_tag:"",logout:"",active_dispatch:"",past_tab:"",out_for_delivery:"",set_delivered:"",select_all:"",no_dispatch:"",updating:"…"}
    };
    let currentLang=sessionStorage.getItem("lova_lang")||"en";
    const pin=sessionStorage.getItem("lova_pin")||"";
    if(!pin)window.location.href="index.html";
    let driverName="",manifestData={},selectedBranch="";
    
    function t(k){return T[currentLang][k]||T.en[k]||k;}
    function setLang(lang){
      currentLang=lang;sessionStorage.setItem("lova_lang",lang);
      document.getElementById("btnEN").style.fontWeight = lang === 'en' ? '600' : '400';
      document.getElementById("btnTH").style.fontWeight = lang === 'th' ? '600' : '400';
      document.getElementById("nav_tag").textContent=t("nav_tag");
      document.getElementById("btn_logout").textContent=t("logout");
      document.getElementById("tabManifest").textContent=t("active_dispatch");
      document.getElementById("tabHistory").textContent=t("past_tab");
    }
    async function callGAS(action,params={}){
      const res=await fetch(GAS_URL+"?callback=_",{method:"POST",body:JSON.stringify({action,...params}),headers:{"Content-Type":"text/plain"}});
      const data=await res.json();if(data.error)throw new Error(data.error);return data.result;
    }
    async function init(){
      try{driverName=await callGAS("verifyDriver",{pin});setLang(currentLang);fetchManifest();fetchHistory();}
      catch(err){alert("Session error: "+err.message);window.location.href="index.html";}
    }
    function logout(){sessionStorage.clear();window.location.href="logout.html?src=driver";}
    
    function switchTab(tab){
      document.getElementById("tabManifest").classList.toggle("active",tab==="manifest");
      document.getElementById("tabHistory").classList.toggle("active",tab==="history");
      document.getElementById("viewManifest").style.display=tab==="manifest"?"block":"none";
      document.getElementById("viewHistory").style.display=tab==="history"?"block":"none";
      const floatingBar = document.getElementById("actionFloatingBar");
      if(floatingBar) floatingBar.style.display = tab==="manifest" ? "flex" : "none";
    }
    
    async function fetchManifest(){
      document.getElementById("manifestContent").innerHTML=`<div class="loading">Loading…</div>`;
      try{
        manifestData=await callGAS("getDriverManifest");
        const branches=Object.keys(manifestData);
        const card=document.getElementById("branchCard"),sel=document.getElementById("branchSelector");
        if(!branches.length){card.style.display="none";document.getElementById("manifestContent").innerHTML=`<div class="loading">${t("no_dispatch")}</div>`;return;}
        card.style.display="block";
        if(!selectedBranch||!branches.includes(selectedBranch))selectedBranch=branches[0];
        sel.innerHTML=branches.map(b=>{const u=Object.values(manifestData[b].totals).reduce((s,v)=>s+v,0);return`<option value="${b}" ${b===selectedBranch?"selected":""}>${b} (${u} units)</option>`;}).join("");
        renderSelectedBranch();
      }catch(err){document.getElementById("manifestContent").innerHTML=`<div class="loading">Failed.</div>`;}
    }

    function getStatusInfo(status){
      const map={ "SENT": {cls:"blue", text:"Prepping"}, "ON THE WAY": {cls:"orange", text:"On the way"}, "STAFF VERIFIED":{cls:"green", text:"Ready"}, "DELIVERED": {cls:"green", text:"Delivered"} };
      const info=map[status]||{cls:"gray",text:status||"Pending"};
      return { cls: `status-${info.cls}`, text: info.text };
    }

    function renderSelectedBranch(){
      selectedBranch=document.getElementById("branchSelector").value;
      const branchData=manifestData[selectedBranch];if(!branchData)return;
      const safeCls="chk-"+selectedBranch.replace(/[^a-zA-Z0-9]/g,"");
      
      let hasSent=false,hasVerified=false;
      for(const o in branchData.orders){if(branchData.orders[o].status==="SENT")hasSent=true;if(branchData.orders[o].status==="STAFF VERIFIED")hasVerified=true;}
      
      let html=`
        <div class="ios-list-group">
          <div style="background:var(--surface-2); padding:10px 16px; border-bottom:1px solid var(--border-soft); font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase;">Truck Totals</div>
          ${Object.entries(branchData.totals).map(([item,qty])=>`<div class="ios-list-item"><span>${item}</span><strong style="font-size:16px;">${qty}</strong></div>`).join("")}
        </div>
        
        <div class="ios-list-group">
          <label style="background:var(--surface-2); padding:10px 16px; border-bottom:1px solid var(--border-soft); display:flex; justify-content:space-between; align-items:center; cursor:pointer;">
             <span style="font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase;">Order Breakdown</span>
             <input type="checkbox" onclick="toggleSelectAll('${safeCls}',this)" checked>
          </label>`;
          
      for(const orderId in branchData.orders){
        const order=branchData.orders[orderId];
        const isOnWay=order.status==="ON THE WAY";
        const sInfo=getStatusInfo(order.status);
        
        html+=`<div style="padding:12px 16px; border-bottom:1px solid var(--border-soft); opacity:${isOnWay?0.6:1};">
                 <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                   <div style="display:flex; align-items:center; gap:12px;">
                     <input type="checkbox" class="${safeCls} order-checkbox" value="${orderId}" data-status="${order.status}" ${isOnWay?"disabled":"checked"}>
                     <div>
                       <div style="font-size:14px; font-weight:600;">${orderId}</div>
                       <div class="status-text ${sInfo.cls}">${sInfo.text}</div>
                     </div>
                   </div>
                 </div>
                 <div style="padding-left:34px;">
                   ${order.items.map(i=>`<div style="display:flex; justify-content:space-between; font-size:13px; padding:2px 0; color:var(--text-muted);"><span>${i.name}</span><strong style="color:var(--text);">${i.qty}</strong></div>`).join("")}
                 </div>
               </div>`;
      }
      html+=`</div>
        <div class="floating-bottom" id="actionFloatingBar">
           <button class="btn-ios btn-orange" id="btn-out-${safeCls}" ${hasSent?"":"disabled"} onclick="submitUpdate('${safeCls}','ON THE WAY')">${t("out_for_delivery")}</button>
           <button class="btn-ios btn-green" id="btn-del-${safeCls}" ${hasVerified?"":"disabled"} onclick="submitUpdate('${safeCls}','DELIVERED')">${t("set_delivered")}</button>
        </div>`;
      document.getElementById("manifestContent").innerHTML=html;
    }
    
    function toggleSelectAll(cls,box){document.querySelectorAll("."+cls).forEach(c=>{if(!c.disabled)c.checked=box.checked;});}
    
    async function submitUpdate(safeCls,newStatus){
      const checkboxes=document.querySelectorAll("."+safeCls);
      const selectedIds=[];
      checkboxes.forEach(c=>{
        if(!c.checked)return;
        const status=c.dataset.status;
        if(newStatus==="ON THE WAY"&&status!=="SENT")return;
        if(newStatus==="DELIVERED"&&status!=="STAFF VERIFIED")return;
        selectedIds.push(c.value);
      });
      if(!selectedIds.length){alert("No valid orders selected.");return;}
      if(!confirm("Confirm action for "+selectedIds.length+" order(s)?"))return;
      
      const btnOut=document.getElementById("btn-out-"+safeCls),btnDel=document.getElementById("btn-del-"+safeCls);
      if(btnOut){btnOut.textContent="...";btnOut.disabled=true;}
      if(btnDel){btnDel.textContent="...";btnDel.disabled=true;}
      try{await callGAS("updateDriverStatus",{orderIds:selectedIds,newStatus,driverName});fetchManifest();fetchHistory();}
      catch(err){ alert("Error: "+err.message); if(btnOut)btnOut.disabled=false; if(btnDel)btnDel.disabled=false; }
    }
    
    async function fetchHistory(){
      try{renderHistory(await callGAS("getDriverHistory",{driverName}));}
      catch{document.getElementById("historyContent").innerHTML=`<div class="loading">Failed.</div>`;}
    }
    function renderHistory(data){
      const container=document.getElementById("historyContent");
      if(!data.length){container.innerHTML=`<div class="loading">No past deliveries.</div>`;return;}
      const grouped={};
      data.forEach(item=>{if(!grouped[item.id])grouped[item.id]={time:item.time,branch:item.branch,status:item.status,items:[]};grouped[item.id].items.push(item);});
      
      container.innerHTML=Object.entries(grouped).map(([oId,order])=>`
        <div class="ios-list-group">
          <div style="background:var(--surface-2); padding:12px 16px; border-bottom:1px solid var(--border-soft); display:flex; justify-content:space-between; align-items:center;">
            <div>
              <div style="font-size:14px; font-weight:600;">${oId}</div>
              <div style="font-size:12px; color:var(--blue); font-weight:600;">${order.branch}</div>
            </div>
            <div style="text-align:right;">
              <div class="status-text status-green">Delivered</div>
              <div style="font-size:11px; color:var(--text-muted);">${order.time}</div>
            </div>
          </div>
          ${order.items.map(sub=>`<div class="ios-list-item"><span style="font-size:13px;">${sub.item}</span><strong style="font-size:14px;">${sub.qty}</strong></div>`).join("")}
        </div>`).join("");
    }
    init();
  </script>
</body>
</html>
