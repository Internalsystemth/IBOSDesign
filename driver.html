<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>[COMPANY_NAME] — Driver Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:#1a1f2e;--navy2:#2d3447;--canvas:#f7f5f0;--surface:#ffffff;
      --border:#e4e1db;--border-soft:#ede9e3;--text:#1a1f2e;--text-2:#5a5750;--text-3:#9a9690;
      --red:#c0392b;
      /* Full status pipeline */
      --s-grey:#64748b;   --s-grey-bg:#f1f5f9;   --s-grey-border:#cbd5e1;
      --s-blue:#1a5fa8;   --s-blue-bg:#eef3fb;   --s-blue-border:#bcd3f0;
      --s-amber:#92570a;  --s-amber-bg:#fef3c7;  --s-amber-border:#fcd34d;
      --s-teal:#0f766e;   --s-teal-bg:#ccfbf1;   --s-teal-border:#5eead4;
      --s-green:#166534;  --s-green-bg:#dcfce7;  --s-green-border:#86efac;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{font-family:'Plus Jakarta Sans','Sarabun',sans-serif;background:var(--canvas);min-height:100vh;padding-bottom:60px;}
    .top-nav{background:var(--navy);padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;position:sticky;top:0;z-index:100;}
    .nav-left{display:flex;align-items:baseline;gap:8px;flex:1 1 auto;min-width:0;overflow:hidden;}
    .nav-wordmark{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:#fff;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:1;}
    .nav-tag{font-size:9px;font-weight:600;color:rgba(255,255,255,0.4);letter-spacing:1px;text-transform:uppercase;flex-shrink:0;}
    .nav-right{display:flex;align-items:center;gap:6px;flex:0 0 auto;}
    .nav-user{font-size:11px;font-weight:500;color:rgba(255,255,255,0.6);margin-right:2px;}
    .lang-toggle-nav{display:flex;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:2px;gap:1px;}
    .lang-btn{padding:2px 6px;border-radius:10px;font-size:9px;font-weight:600;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,0.5);transition:all 0.15s;}
    .lang-btn.active{background:rgba(255,255,255,0.2);color:#fff;}
    .btn-logout{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.12);padding:5px 8px;border-radius:6px;font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;font-weight:500;cursor:pointer;transition:background 0.15s;}
    .content{padding:14px;max-width:600px;margin:0 auto;}
    .tabs{display:flex;background:var(--canvas);border:1px solid var(--border);border-radius:8px;padding:3px;margin-bottom:12px;gap:3px;}
    .tab{flex:1;text-align:center;padding:8px;font-size:11px;font-weight:500;color:var(--text-3);cursor:pointer;border-radius:6px;transition:background 0.15s,color 0.15s;}
    .tab.active{background:var(--surface);color:var(--text);font-weight:600;box-shadow:0 1px 3px rgba(26,31,46,0.05);}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:12px;box-shadow:0 1px 3px rgba(26,31,46,0.03);}
    .branch-label{font-size:10px;font-weight:600;color:var(--text-3);letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:6px;}
    .branch-row{display:flex;align-items:center;justify-content:space-between;}
    .branch-select{flex:1;border:none;background:transparent;font-family:'Plus Jakarta Sans','Sarabun',sans-serif;font-size:14px;font-weight:600;color:var(--text);outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;}
    .btn-refresh{background:none;border:1px solid var(--border);border-radius:6px;font-size:15px;color:var(--text-3);cursor:pointer;padding:4px 10px;transition:background 0.15s,color 0.15s;outline:none;}
    .totals-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 3px rgba(26,31,46,0.03);}
    .totals-head{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border-bottom:1px solid var(--border-soft);}
    .totals-head-left{display:flex;align-items:center;gap:8px;}
    .totals-title{font-size:10px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:1.5px;}
    .badge-sm{font-size:9px;font-weight:500;background:var(--canvas);color:var(--text-3);padding:2px 8px;border-radius:4px;border:1px solid var(--border);}
    .totals-body{padding:0 14px;}
    .total-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-soft);font-size:12px;font-weight:500;color:var(--text);}
    .total-row:last-child{border-bottom:none;}
    .total-row strong{font-weight:600;}
    .breakdown-head{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;background:var(--canvas);border-bottom:1px solid var(--border);border-top:1px solid var(--border);cursor:pointer;}
    .breakdown-title{font-size:10px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:1.5px;}
    .select-all-label{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:500;color:var(--text-2);cursor:pointer;}
    input[type="checkbox"]{width:15px;height:15px;accent-color:var(--s-blue);cursor:pointer;}
    .order-checkbox:disabled{cursor:not-allowed;opacity:0.35;}
    /* STATUS BADGES  */
    .status-badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:9px;font-weight:700;margin-top:4px;border:1px solid;letter-spacing:0.3px;}
    .s-grey  {background:var(--s-grey-bg); color:var(--s-grey);  border-color:var(--s-grey-border);}
    .s-blue  {background:var(--s-blue-bg);  color:var(--s-blue);  border-color:var(--s-blue-border);}
    .s-amber {background:var(--s-amber-bg); color:var(--s-amber); border-color:var(--s-amber-border);}
    .s-teal  {background:var(--s-teal-bg);  color:var(--s-teal);  border-color:var(--s-teal-border);}
    .s-green {background:var(--s-green-bg); color:var(--s-green); border-color:var(--s-green-border);}
    /* ORDER BOXES  */
    .order-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;}
    .order-box-top{display:flex;align-items:flex-start;gap:10px;}
    .order-box-info{flex:1;}
    .order-id{font-size:11px;font-weight:600;color:var(--text);display:flex;align-items:center;justify-content:space-between;}
    .order-items-expand{display:none;margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);}
    .order-sub-item{display:flex;justify-content:space-between;font-size:11px;font-weight:500;color:var(--text-2);padding:4px 0;border-bottom:1px solid var(--border-soft);}
    .order-sub-item:last-child{border-bottom:none;}
    .order-sub-item strong{color:var(--text);font-weight:600;}
    .expand-icon{font-size:10px;color:var(--text-3);cursor:pointer;padding:2px 4px;}
    /* ACTION BUTTONS */
    .btn-row{display:flex;gap:8px;margin-top:12px;margin-bottom:12px;}
    .btn-action{flex:1;height:44px;border:1.5px solid;border-radius:8px;font-family:'Plus Jakarta Sans','Sarabun',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:opacity 0.15s,transform 0.15s;letter-spacing:0.3px;}
    .btn-action:active:not(:disabled){transform:scale(0.98);}
    .btn-action:disabled{background:var(--canvas);color:var(--text-3);border-color:var(--border);cursor:not-allowed;font-weight:500;}
    .btn-out-delivery{background:var(--s-amber-bg);color:var(--s-amber);border-color:var(--s-amber-border);}
    .btn-out-delivery:hover:not(:disabled){background:#fde68a;}
    .btn-set-delivered{background:var(--s-green);color:#fff;border-color:var(--s-green);}
    .btn-set-delivered:hover:not(:disabled){background:#15803d;}
    /* History */
    .section-label{font-size:10px;font-weight:600;color:var(--text-3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border-soft);}
    .history-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px;box-shadow:0 1px 3px rgba(26,31,46,0.03);}
    .hist-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;padding-bottom:8px;border-bottom:1px dashed var(--border);}
    .hist-id{font-size:11px;font-weight:600;color:var(--text);}
    .hist-branch{font-size:10px;font-weight:600;color:var(--s-blue);text-transform:uppercase;letter-spacing:0.3px;margin-top:2px;}
    .hist-time{font-size:10px;color:var(--text-3);}
    .hist-item{display:flex;justify-content:space-between;font-size:11px;color:var(--text-2);font-weight:500;padding:5px 0;border-bottom:1px solid var(--border-soft);}
    .hist-item:last-child{border-bottom:none;}
    .hist-item strong{color:var(--text);font-weight:600;}
    .loading{text-align:center;color:var(--text-3);padding:30px 20px;font-size:12px;}
    .empty-state{text-align:center;color:var(--s-green);padding:30px 20px;font-size:12px;font-weight:500;}
  </style>
</head>
<body>
  <nav class="top-nav">
    <div class="nav-left">
      <div class="nav-wordmark">[COMPANY_NAME]</div>
      <div class="nav-tag" id="nav_tag">Driver</div>
    </div>
    <div class="nav-right">
      <div class="nav-user" id="navUser"></div>
      <div class="lang-toggle-nav">
        <button class="lang-btn active" id="btnEN" onclick="setLang('en')">EN</button>
        <button class="lang-btn" id="btnTH" onclick="setLang('th')">TH</button>
      </div>
      <button class="btn-logout" id="btn_logout" onclick="logout()">Logout</button>
    </div>
  </nav>
  <div class="content">
    <div class="tabs">
      <div class="tab active" id="tabManifest" onclick="switchTab('manifest')">Active dispatch</div>
      <div class="tab" id="tabHistory" onclick="switchTab('history')">Past deliveries</div>
    </div>
    <div id="viewManifest">
      <div class="card" id="branchCard" style="display:none;">
        <span class="branch-label" id="txt_delivering_to">Delivering to</span>
        <div class="branch-row">
          <select id="branchSelector" class="branch-select" onchange="renderSelectedBranch()"></select>
          <button class="btn-refresh" onclick="fetchManifest()">↺</button>
        </div>
      </div>
      <div id="manifestContent"><div class="loading">Loading…</div></div>
    </div>
    <div id="viewHistory" style="display:none;">
      <div class="section-label" id="txt_past_label">Past deliveries — last 7 days</div>
      <div id="historyContent"><div class="loading">Loading…</div></div>
    </div>
  </div>
  <script>
    const GAS_URL="https://script.google.com/macros/s/AKfycbxxYwYzml0eTiKjYERhcVKmgjeqP7x3rQrgpOTewhFrtH6BGUFEUh7-Da_EX6tnzJF75Q/exec";
    
    const T={
      en:{nav_tag:"Driver",logout:"Logout",active_dispatch:"Active dispatch",past_tab:"Past deliveries",past_label:"Past deliveries — last 7 days",delivering_to:"Delivering to",total_for_truck:"Total for truck",order_breakdown:"Order breakdown",out_for_delivery:"Out for delivery",set_delivered:"Set delivered",select_all:"Select all",no_dispatch:"All clear — no active dispatch.",
        prepping:"Prepping",on_the_way:"On the way",chef_confirmed:"Chef confirmed",delivered:"Delivered",updating:"Updating…"},
      th:{nav_tag:"",logout:"",active_dispatch:"",past_tab:"",past_label:" — 7 ",delivering_to:"",total_for_truck:"",order_breakdown:"",out_for_delivery:"",set_delivered:"",select_all:"",no_dispatch:"",
        prepping:"",on_the_way:"",chef_confirmed:"",delivered:"",updating:"…"}
    };
    let currentLang=sessionStorage.getItem("lova_lang")||"en";
    const pin=sessionStorage.getItem("lova_pin")||"";
    if(!pin)window.location.href="index.html";
    let driverName="",manifestData={},selectedBranch="";
    function t(k){return T[currentLang][k]||T.en[k]||k;}
    function setLang(lang){
      currentLang=lang;sessionStorage.setItem("lova_lang",lang);
      document.getElementById("btnEN").classList.toggle("active",lang==="en");
      document.getElementById("btnTH").classList.toggle("active",lang==="th");
      document.getElementById("nav_tag").textContent=t("nav_tag");
      document.getElementById("btn_logout").textContent=t("logout");
      document.getElementById("tabManifest").textContent=t("active_dispatch");
      document.getElementById("tabHistory").textContent=t("past_tab");
      document.getElementById("txt_delivering_to").textContent=t("delivering_to");
      document.getElementById("txt_past_label").textContent=t("past_label");
    }
    async function callGAS(action,params={}){
      const res=await fetch(GAS_URL+"?callback=_",{method:"POST",body:JSON.stringify({action,...params}),headers:{"Content-Type":"text/plain"}});
      const data=await res.json();if(data.error)throw new Error(data.error);return data.result;
    }
    async function init(){
      try{driverName=await callGAS("verifyDriver",{pin});document.getElementById("navUser").textContent=driverName;setLang(currentLang);fetchManifest();fetchHistory();}
      catch(err){alert("Session error: "+err.message);window.location.href="index.html";}
    }
    function logout(){sessionStorage.clear();window.location.href="logout.html?src=driver";}
    function switchTab(tab){
      document.getElementById("tabManifest").classList.toggle("active",tab==="manifest");
      document.getElementById("tabHistory").classList.toggle("active",tab==="history");
      document.getElementById("viewManifest").style.display=tab==="manifest"?"block":"none";
      document.getElementById("viewHistory").style.display=tab==="history"?"block":"none";
    }
    async function fetchManifest(){
      document.getElementById("manifestContent").innerHTML=`<div class="loading">${t("loading")||"Loading…"}</div>`;
      try{
        manifestData=await callGAS("getDriverManifest");
        const branches=Object.keys(manifestData);
        const card=document.getElementById("branchCard"),sel=document.getElementById("branchSelector");
        if(!branches.length){card.style.display="none";document.getElementById("manifestContent").innerHTML=`<div class="empty-state">${t("no_dispatch")}</div>`;return;}
        card.style.display="block";
        if(!selectedBranch||!branches.includes(selectedBranch))selectedBranch=branches[0];
        sel.innerHTML=branches.map(b=>{const u=Object.values(manifestData[b].totals).reduce((s,v)=>s+v,0);return`<option value="${b}" ${b===selectedBranch?"selected":""}>${b} (${u})</option>`;}).join("");
        renderSelectedBranch();
      }catch(err){document.getElementById("manifestContent").innerHTML=`<div class="loading">Failed.</div>`;}
    }

    /* Map status  badge class and label */
    function getStatusInfo(status,lang){
      const map={
        "SENT":       {cls:"s-blue",  en:"Prepping",        th:""},
        "ON THE WAY": {cls:"s-amber", en:"On the way",      th:""},
        "STAFF VERIFIED":{cls:"s-teal", en:"Chef confirmed", th:""},
        "DELIVERED":  {cls:"s-green", en:"Delivered",       th:""},
      };
      const info=map[status]||{cls:"s-grey",en:status||"Pending",th:status||""};
      return{cls:info.cls,label:lang==="th"?info.th:info.en};
    }

    function renderSelectedBranch(){
      selectedBranch=document.getElementById("branchSelector").value;
      const branchData=manifestData[selectedBranch];if(!branchData)return;
      const safeCls="chk-"+selectedBranch.replace(/[^a-zA-Z0-9]/g,"");
      const totalUnits=Object.values(branchData.totals).reduce((s,v)=>s+v,0);
      const uniqueItems=Object.keys(branchData.totals).length;
      const totalOrders=Object.keys(branchData.orders).length;
      let hasSent=false,hasVerified=false;
      for(const o in branchData.orders){if(branchData.orders[o].status==="SENT")hasSent=true;if(branchData.orders[o].status==="STAFF VERIFIED")hasVerified=true;}
      let html=`
        <div class="totals-card">
          <div class="totals-head" onclick="toggleExpand('totals')">
            <div class="totals-head-left"><span class="totals-title">${t("total_for_truck")}</span><span class="badge-sm">${uniqueItems} · ${totalUnits}</span></div>
            <span id="icon-totals" style="font-size:10px;color:var(--text-3);"></span>
          </div>
          <div id="body-totals" class="totals-body">
            ${Object.entries(branchData.totals).map(([item,qty])=>`<div class="total-row"><span>${item}</span><strong>${qty}</strong></div>`).join("")}
          </div>
        </div>
        <div class="totals-card">
          <div class="breakdown-head" onclick="toggleExpand('breakdown')">
            <div style="display:flex;align-items:center;gap:8px;">
              <span class="breakdown-title">${t("order_breakdown")}</span>
              <span class="badge-sm">${totalOrders}</span>
              <span id="icon-breakdown" style="font-size:10px;color:var(--text-3);"></span>
            </div>
            <label class="select-all-label" onclick="event.stopPropagation()">
              <input type="checkbox" onclick="toggleSelectAll('${safeCls}',this)" checked> ${t("select_all")}
            </label>
          </div>
          <div id="body-breakdown" style="padding:10px 10px 0;">`;
      for(const orderId in branchData.orders){
        const order=branchData.orders[orderId];
        const isOnWay=order.status==="ON THE WAY";
        const{cls,label}=getStatusInfo(order.status,currentLang);
        html+=`<div class="order-box" style="${isOnWay?"opacity:0.65":""}">
          <div class="order-box-top">
            <input type="checkbox" class="${safeCls} order-checkbox" value="${orderId}" data-status="${order.status}" ${isOnWay?"disabled":"checked"}>
            <div class="order-box-info" onclick="toggleOrderExpand('${orderId}')">
              <div class="order-id"><span>${orderId}</span><span class="expand-icon" id="icon-ord-${orderId}"></span></div>
              <div class="status-badge ${cls}">${label}</div>
            </div>
          </div>
          <div class="order-items-expand" id="exp-${orderId}">
            ${order.items.map(i=>`<div class="order-sub-item"><span>${i.name}</span><strong>${i.qty}</strong></div>`).join("")}
          </div>
        </div>`;
      }
      html+=`</div>
          <div class="btn-row" style="padding:0 10px 12px;">
            <button class="btn-action btn-out-delivery" id="btn-out-${safeCls}" ${hasSent?"":"disabled"} onclick="submitUpdate('${safeCls}','ON THE WAY')">${t("out_for_delivery")}</button>
            <button class="btn-action btn-set-delivered" id="btn-del-${safeCls}" ${hasVerified?"":"disabled"} onclick="submitUpdate('${safeCls}','DELIVERED')">${t("set_delivered")}</button>
          </div>
        </div>`;
      document.getElementById("manifestContent").innerHTML=html;
    }
    function toggleExpand(section){
      const body=document.getElementById("body-"+section),icon=document.getElementById("icon-"+section);
      if(!body)return;const open=body.style.display!=="none";
      body.style.display=open?"none":"block";if(icon)icon.textContent=open?"":"";
    }
    function toggleOrderExpand(orderId){
      const exp=document.getElementById("exp-"+orderId),icon=document.getElementById("icon-ord-"+orderId);
      if(!exp)return;const open=exp.style.display==="block";
      exp.style.display=open?"none":"block";if(icon)icon.textContent=open?"":"";
    }
    function toggleSelectAll(cls,box){document.querySelectorAll("."+cls).forEach(c=>{if(!c.disabled)c.checked=box.checked;});}
    async function submitUpdate(safeCls,newStatus){
      const checkboxes=document.querySelectorAll("."+safeCls);
      const selectedIds=[];
      checkboxes.forEach(c=>{
        if(!c.checked)return;
        const status=c.dataset.status;
        if(newStatus==="ON THE WAY"&&status!=="SENT")return;
        if(newStatus==="DELIVERED"&&status!=="STAFF VERIFIED")return;
        selectedIds.push(c.value);
      });
      if(!selectedIds.length){alert(currentLang==="th"?"":"No valid orders selected.");return;}
      const label=newStatus==="ON THE WAY"?t("out_for_delivery"):t("set_delivered");
      if(!confirm((currentLang==="th"?": ":"Confirm: ")+selectedIds.length+(currentLang==="th"?"  — ":" order(s) — ")+label+"?"))return;
      const btnOut=document.getElementById("btn-out-"+safeCls),btnDel=document.getElementById("btn-del-"+safeCls);
      if(btnOut){btnOut.textContent=t("updating");btnOut.disabled=true;}
      if(btnDel){btnDel.textContent=t("updating");btnDel.disabled=true;}
      try{await callGAS("updateDriverStatus",{orderIds:selectedIds,newStatus,driverName});fetchManifest();fetchHistory();}
      catch(err){
        alert("Error: "+err.message);
        if(btnOut){btnOut.textContent=t("out_for_delivery");btnOut.disabled=false;}
        if(btnDel){btnDel.textContent=t("set_delivered");btnDel.disabled=false;}
      }
    }
    async function fetchHistory(){
      try{renderHistory(await callGAS("getDriverHistory",{driverName}));}
      catch{document.getElementById("historyContent").innerHTML=`<div class="loading">Failed.</div>`;}
    }
    function renderHistory(data){
      const container=document.getElementById("historyContent");
      if(!data.length){container.innerHTML=`<div class="loading">${currentLang==="th"?"":"No past deliveries found."}</div>`;return;}
      const grouped={};
      data.forEach(item=>{if(!grouped[item.id])grouped[item.id]={time:item.time,branch:item.branch,status:item.status,items:[]};grouped[item.id].items.push(item);});
      const{cls:hCls,label:hLabel}=getStatusInfo("DELIVERED",currentLang);
      container.innerHTML=Object.entries(grouped).map(([oId,order])=>`
        <div class="history-card">
          <div class="hist-top">
            <div><div class="hist-id">${oId}</div><div class="hist-branch">${order.branch}</div></div>
            <div style="text-align:right">
              <div class="status-badge ${hCls}" style="margin-top:0;">${hLabel}</div>
              <div class="hist-time" style="margin-top:4px;">${order.time}</div>
            </div>
          </div>
          ${order.items.map(sub=>`<div class="hist-item"><span>${sub.item}</span><strong>×${sub.qty}</strong></div>`).join("")}
        </div>`).join("");
    }
    init();
  </script>
</body>
</html>
